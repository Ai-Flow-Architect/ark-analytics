# ark-analytics 設定ファイル
# 機密情報は環境変数で管理（このファイルにAPIキーを直書きしない）

gcp:
  # project_id は環境変数 ARK_GCP_PROJECT_ID から取得（src/_config_loader.get_project_id 参照）
  # 機密情報・クライアント固有値は YAML に書かない方針
  dataset_staging: "staging"
  dataset_marts: "marts"
  dataset_reports: "reports"
  location: "asia-northeast1"
  # ADC (Application Default Credentials) 使用。サービスアカウントキー未使用
  service_account_key: ""

ga4:
  # property_id / raw_dataset は環境変数で上書きされる（_config_loader.load_config）
  # ARK_GA4_PROPERTY_ID / ARK_GA4_RAW_DATASET
  property_id: ""
  raw_dataset: ""

kpi_targets:
  monthly_sessions: 5000
  monthly_inquiries: 9
  monthly_downloads: 30
  monthly_appointments: 6
  monthly_contracts: 3  # KGI

report:
  openai_model: "gpt-4o"
  temperature: 0.3
  max_tokens_executive: 800
  max_tokens_ops: 1500
  # 配信先（環境変数から取得）
  # client_email は環境変数 ARK_CLIENT_EMAIL から取得（src/delivery.py 参照）
  # cc_emails は環境変数 ARK_CC_EMAILS（カンマ区切り）から取得
  client_email: ""
  cc_emails: []
  drive_folder_id: ""  # 環境変数 ARK_DRIVE_FOLDER_ID
  lark_webhook: ""    # 環境変数 LARK_WEBHOOK_URL

schedule:
  daily_bq_refresh: "0 4 * * *"      # 毎日 AM 4:00
  monthly_report: "0 9 1 * *"         # 毎月1日 AM 9:00
  weekly_report: "0 9 * * 1"          # 毎週月曜 AM 9:00
