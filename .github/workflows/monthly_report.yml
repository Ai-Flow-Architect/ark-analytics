name: Monthly Report

on:
  schedule:
    # 毎月1日 AM 9:00 JST = 毎月1日 0:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'YYYY-MM (空欄なら先月)'
        required: false
        default: ''

jobs:
  send-monthly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write GCP Service Account key
        run: |
          echo "$GCP_SERVICE_ACCOUNT_KEY" > /tmp/gcp-sa.json
          chmod 600 /tmp/gcp-sa.json
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Run monthly report
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa.json
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARK_OPENAI_API_KEY: ${{ secrets.ARK_OPENAI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ARK_CLIENT_EMAIL: ${{ secrets.ARK_CLIENT_EMAIL }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          TZ: Asia/Tokyo
        run: |
          MONTH_ARG="${{ github.event.inputs.month }}"
          if [ -z "$MONTH_ARG" ]; then
            python main.py --report-type monthly
          else
            python main.py --report-type monthly --month "$MONTH_ARG"
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/gcp-sa.json
