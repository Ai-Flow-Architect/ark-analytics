name: Monthly Report

on:
  schedule:
    # 毎月1日 AM 9:00 JST = 毎月1日 0:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      month:
        description: 'YYYY-MM (空欄なら先月)'
        required: false
        default: ''

permissions:
  contents: read
  issues: write     # notify-failure 用

jobs:
  send-monthly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write GCP Service Account key
        run: |
          echo "$GCP_SERVICE_ACCOUNT_KEY" > /tmp/gcp-sa.json
          chmod 600 /tmp/gcp-sa.json
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Run monthly report
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa.json
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARK_OPENAI_API_KEY: ${{ secrets.ARK_OPENAI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ARK_CLIENT_EMAIL: ${{ secrets.ARK_CLIENT_EMAIL }}
          ARK_CC_EMAILS: ${{ secrets.ARK_CC_EMAILS }}
          ARK_GCP_PROJECT_ID: ${{ secrets.ARK_GCP_PROJECT_ID }}
          ARK_GA4_PROPERTY_ID: ${{ secrets.ARK_GA4_PROPERTY_ID }}
          ARK_GA4_RAW_DATASET: ${{ secrets.ARK_GA4_RAW_DATASET }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_CHAT_ID: ${{ secrets.LARK_CHAT_ID }}
          TZ: Asia/Tokyo
        run: |
          MONTH_ARG="${{ github.event.inputs.month }}"
          if [ -z "$MONTH_ARG" ]; then
            python main.py --report-type monthly
          else
            python main.py --report-type monthly --month "$MONTH_ARG"
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/gcp-sa.json

      # ---------- 失敗時の冗長化通知（Lark + Issue + Mail） ----------
      - name: Notify failure (3 channels)
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          lark_webhook:     ${{ secrets.LARK_BOT_WEBHOOK }}
          smtp_user:        ${{ secrets.SMTP_USER }}
          smtp_pass:        ${{ secrets.SMTP_PASS }}
          alert_recipients: ${{ secrets.ALERT_RECIPIENTS }}
          github_token:     ${{ secrets.GITHUB_TOKEN }}
          failed_step:      "monthly_report"
          severity:         "critical"
